apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-cert
  namespace: envoy-gateway-system
spec:
  secretName: wildcard-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "*.pelindungbumi.dev"
  dnsNames:
    - "*.pelindungbumi.dev"
    - "pelindungbumi.dev"
  duration: 2160h   # 90 days
  renewBefore: 720h # 30 days
