configs:
  cm:
    resource.customizations.health.argoproj.io_Application: |
      hs = {}
      hs.status = "Progressing"
      hs.message = ""
      if obj.status ~= nil then
        if obj.status.health ~= nil then
          hs.status = obj.status.health.status
          if obj.status.health.message ~= nil then
            hs.message = obj.status.health.message
          end
        end
      end
      return hs
    resource.customizations.health.ceph.rook.io_CephCluster: |
      hs = {}
      hs.status = "Progressing"
      hs.message = "Waiting for Ceph cluster readiness"
      if obj.status ~= nil then
        if obj.status.phase == "Ready" and obj.status.state == "Created" then
          hs.status = "Healthy"
          hs.message = obj.status.message or "Cluster created successfully"
          return hs
        end
        if obj.status.message ~= nil then
          hs.message = obj.status.message
        end
      end
      return hs
  params:
    server.insecure: true

controller:
  replicas: 2
  pdb:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi

