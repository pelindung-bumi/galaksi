apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openbao
  namespace: argo
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: pelindung-bumi-prod
  sources:
    - repoURL: https://github.com/hashicorp/openbao
      targetRevision: 2.5.0
      path: charts/openbao
      helm:
        releaseName: openbao
        valueFiles:
          - $values/base/openbao/values/values-common.yaml
          - $values/overlays/pelindung-bumi/prod/openbao/values/values.yaml
    - repoURL: https://github.com/pelindung-bumi/galaksi
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: openbao
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
