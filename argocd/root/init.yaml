apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: init
  namespace: argo
spec:
  project: default
  sources:
    - repoURL: https://github.com/pelindung-bumi/galaksi
      targetRevision: HEAD
      path: argocd/projects
    - repoURL: https://github.com/pelindung-bumi/galaksi
      targetRevision: HEAD
      path: argocd/app
    - repoURL: https://github.com/pelindung-bumi/galaksi
      targetRevision: HEAD
      path: argocd/appsets
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
