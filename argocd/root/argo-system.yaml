apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-system
  namespace: argo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: 9.4.15
      helm:
        releaseName: argocd
        valueFiles:
          - $values/argocd/values/values.yaml
    - repoURL: https://github.com/pelindung-bumi/galaksi
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/pelindung-bumi/galaksi
      targetRevision: HEAD
      path: argocd/projects
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
